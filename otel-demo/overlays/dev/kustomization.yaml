apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: otel-demo-dev

resources:
  - ../../base

patches:
  # dev: lower replicas, debug log level for load-generator
  - target:
      kind: Deployment
      name: load-generator
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: load-generator
      spec:
        replicas: 1
  # Set namespace for analysis FQDN (controller runs in argo-rollouts ns)
  - target:
      kind: Rollout
      name: frontend
    patch: |-
      - op: replace
        path: /spec/strategy/blueGreen/prePromotionAnalysis/args/1/value
        value: otel-demo-dev

images:
  - name: ghcr.io/open-telemetry/demo:2.2.0-product-catalog
    newName: ghcr.io/open-telemetry/demo
    newTag: pre-release-product-catalog
  - name: ghcr.io/open-telemetry/demo:2.2.0-currency
    newName: ghcr.io/open-telemetry/demo
    newTag: pre-release-currency
  - name: ghcr.io/open-telemetry/demo:2.2.0-cart
    newName: ghcr.io/open-telemetry/demo
    newTag: pre-release-cart
  - name: ghcr.io/open-telemetry/demo:2.2.0-frontend
    newName: ghcr.io/open-telemetry/demo
    newTag: pre-release-frontend
