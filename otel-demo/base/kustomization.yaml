  # Envoy config override (increase route timeout from 15s to 60s)
  - patches/configmap-envoy-tmpl.yaml
  # Blue/Green Rollout
  - patches/service-frontend-preview.yaml
  - patches/analysis-template.yaml
  # OpenShift Routes
  - patches/route-frontend-proxy.yaml
  - patches/route-grafana.yaml
  - patches/route-jaeger.yaml

# Note: securityContext patches removed — using anyuid SCC instead
# to allow community images to run with their expected UIDs

patches:
  # Increase Prometheus memory (default 400Mi causes OOM on OpenShift)
  - target:
      kind: Deployment
      name: prometheus
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: prometheus
      spec:
        template:
          spec:
            containers:
              - name: prometheus-server
                resources:
                  limits:
                    memory: 2Gi
  # Mount custom envoy config (route timeout 60s) into frontend-proxy
  - target:
      kind: Deployment
      name: frontend-proxy
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frontend-proxy
      spec:
        template:
          spec:
            containers:
              - name: frontend-proxy
                volumeMounts:
                  - name: envoy-tmpl
                    mountPath: /home/envoy/envoy.tmpl.yaml
                    subPath: envoy.tmpl.yaml
            volumes:
              - name: envoy-tmpl
                configMap:
                  name: frontend-proxy-envoy-tmpl
