  - manifests/deployment-fraud-detection.yaml
  - manifests/deployment-frontend-proxy.yaml
  # deployment-frontend.yaml replaced by Rollout
  - patches/rollout-frontend.yaml
  - manifests/deployment-grafana.yaml
  - manifests/deployment-image-provider.yaml
  - manifests/deployment-jaeger.yaml
  - manifests/deployment-kafka.yaml
  - manifests/deployment-llm.yaml
  - manifests/deployment-load-generator.yaml
  - manifests/deployment-payment.yaml
  - manifests/deployment-postgresql.yaml
  - manifests/deployment-product-catalog.yaml
  - manifests/deployment-product-reviews.yaml
