apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: otel-demo-prod
  namespace: openshift-gitops
spec:
  description: OTel Demo - Production environment
  sourceRepos:
    - https://github.com/tarosaiba/argo-rollouts-sample.git
  destinations:
    - namespace: otel-demo-prod
      server: https://kubernetes.default.svc
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
