apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: progressive-release
  labels:
    app.kubernetes.io/part-of: otel-demo-ci
spec:
  description: |
    Stage-based progressive release for OTel Demo (dev environment).
    Stage 1: product-catalog + currency (parallel)
    Stage 2: cart (after Stage 1)
    Stage 3: frontend (after Stage 2)
  params:
    - name: image-tag
      type: string
      description: New image tag to deploy (e.g. 2.3.0)
    - name: slack-channel
      type: string
      default: "#notification-test"
      description: Slack channel for release notifications
  workspaces:
    - name: shared-workspace
    - name: git-credentials
  tasks:
    # Pipeline start notification
    - name: notify-pipeline-start
      params:
        - name: image-tag
          value: $(params.image-tag)
        - name: slack-channel
          value: $(params.slack-channel)
      taskSpec:
        params:
          - name: image-tag
          - name: slack-channel
        steps:
          - name: notify
            image: curlimages/curl:8.7.1
            env:
              - name: SLACK_BOT_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: slack-bot-secret
                    key: token
                    optional: true
            script: |
              #!/bin/sh
              set -eu
              TAG="$(params.image-tag)"
              CHANNEL="$(params.slack-channel)"
              MSG="progressive-release ${TAG} started (product-catalog, currency -> cart -> frontend)"
              COLOR="#1e90ff"

              if [ -n "${SLACK_BOT_TOKEN:-}" ]; then
                curl -s -X POST https://slack.com/api/chat.postMessage \
                  -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"channel\":\"${CHANNEL}\",\"attachments\":[{\"color\":\"${COLOR}\",\"text\":\"${MSG}\"}]}"
              else
                echo "SLACK_BOT_TOKEN not set, skipping notification"
              fi
              echo "Notification: ${MSG}"
    # Stage 1 — parallel (after start notification)
    - name: release-product-catalog
      runAfter:
        - notify-pipeline-start
      taskRef:
        name: update-and-sync
      params:
        - name: app-name
          value: product-catalog
        - name: image-tag
          value: $(params.image-tag)
        - name: slack-channel
          value: $(params.slack-channel)
      workspaces:
        - name: shared-workspace
          workspace: shared-workspace
          subPath: product-catalog
        - name: git-credentials
          workspace: git-credentials
    - name: release-currency
      runAfter:
        - notify-pipeline-start
      taskRef:
        name: update-and-sync
      params:
        - name: app-name
          value: currency
        - name: image-tag
          value: $(params.image-tag)
        - name: slack-channel
          value: $(params.slack-channel)
      workspaces:
        - name: shared-workspace
          workspace: shared-workspace
          subPath: currency
        - name: git-credentials
          workspace: git-credentials
    # Stage 2 — after Stage 1
    - name: release-cart
      runAfter:
        - release-product-catalog
        - release-currency
      taskRef:
        name: update-and-sync
      params:
        - name: app-name
          value: cart
        - name: image-tag
          value: $(params.image-tag)
        - name: slack-channel
          value: $(params.slack-channel)
      workspaces:
        - name: shared-workspace
          workspace: shared-workspace
          subPath: cart
        - name: git-credentials
          workspace: git-credentials
    # Stage 3 — after Stage 2
    - name: release-frontend
      runAfter:
        - release-cart
      taskRef:
        name: update-and-sync
      params:
        - name: app-name
          value: frontend
        - name: image-tag
          value: $(params.image-tag)
        - name: slack-channel
          value: $(params.slack-channel)
      workspaces:
        - name: shared-workspace
          workspace: shared-workspace
          subPath: frontend
        - name: git-credentials
          workspace: git-credentials
  # Pipeline completion notification (always runs)
  finally:
    - name: notify-pipeline-result
      params:
        - name: image-tag
          value: $(params.image-tag)
        - name: slack-channel
          value: $(params.slack-channel)
        - name: pipeline-status
          value: $(tasks.status)
      taskSpec:
        params:
          - name: image-tag
          - name: slack-channel
          - name: pipeline-status
        steps:
          - name: notify
            image: curlimages/curl:8.7.1
            env:
              - name: SLACK_BOT_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: slack-bot-secret
                    key: token
                    optional: true
            script: |
              #!/bin/sh
              set -u
              TAG="$(params.image-tag)"
              STATUS="$(params.pipeline-status)"
              CHANNEL="$(params.slack-channel)"

              if [ "$STATUS" = "Succeeded" ]; then
                MSG="progressive-release ${TAG} completed - all stages succeeded"
                COLOR="#36a64f"
              else
                MSG="progressive-release ${TAG} failed (status: ${STATUS})"
                COLOR="#dc3545"
              fi

              if [ -n "${SLACK_BOT_TOKEN:-}" ]; then
                curl -s -X POST https://slack.com/api/chat.postMessage \
                  -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
                  -H "Content-Type: application/json" \
                  -d "{\"channel\":\"${CHANNEL}\",\"attachments\":[{\"color\":\"${COLOR}\",\"text\":\"${MSG}\"}]}"
              else
                echo "SLACK_BOT_TOKEN not set, skipping notification"
              fi
              echo "Notification: ${MSG}"
