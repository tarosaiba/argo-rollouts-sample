apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: progressive-release
  labels:
    app.kubernetes.io/part-of: otel-demo-ci
spec:
  description: |
    Stage-based progressive release for OTel Demo (dev environment).
    Stage 1: product-catalog + currency (parallel)
    Stage 2: cart (after Stage 1)
    Stage 3: frontend (after Stage 2)
  params:
    - name: image-tag
      type: string
      description: New image tag to deploy (e.g. 2.3.0)
  workspaces:
    - name: shared-workspace
    - name: git-credentials
  tasks:
    # Stage 1 — parallel
    - name: release-product-catalog
      taskRef:
        name: update-and-sync
      params:
        - name: app-name
          value: product-catalog
        - name: image-tag
          value: $(params.image-tag)
      workspaces:
        - name: shared-workspace
          workspace: shared-workspace
          subPath: product-catalog
        - name: git-credentials
          workspace: git-credentials
    - name: release-currency
      taskRef:
        name: update-and-sync
      params:
        - name: app-name
          value: currency
        - name: image-tag
          value: $(params.image-tag)
      workspaces:
        - name: shared-workspace
          workspace: shared-workspace
          subPath: currency
        - name: git-credentials
          workspace: git-credentials
    # Stage 2 — after Stage 1
    - name: release-cart
      runAfter:
        - release-product-catalog
        - release-currency
      taskRef:
        name: update-and-sync
      params:
        - name: app-name
          value: cart
        - name: image-tag
          value: $(params.image-tag)
      workspaces:
        - name: shared-workspace
          workspace: shared-workspace
          subPath: cart
        - name: git-credentials
          workspace: git-credentials
    # Stage 3 — after Stage 2
    - name: release-frontend
      runAfter:
        - release-cart
      taskRef:
        name: update-and-sync
      params:
        - name: app-name
          value: frontend
        - name: image-tag
          value: $(params.image-tag)
      workspaces:
        - name: shared-workspace
          workspace: shared-workspace
          subPath: frontend
        - name: git-credentials
          workspace: git-credentials
