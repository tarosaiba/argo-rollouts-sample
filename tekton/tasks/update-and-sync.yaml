apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: update-and-sync
  labels:
    app.kubernetes.io/part-of: otel-demo-ci
spec:
  description: |
    Update an OTel Demo component's image tag in the manifest repo,
    commit & push, then trigger ArgoCD sync and wait for healthy.
  params:
    - name: app-name
      type: string
      description: Component name (e.g. frontend, cart, currency, product-catalog)
    - name: image-tag
      type: string
      description: New image tag to deploy
    - name: manifest-repo-url
      type: string
      default: https://github.com/tarosaiba/argo-rollouts-sample.git
    - name: manifest-repo-branch
      type: string
      default: main
  workspaces:
    - name: shared-workspace
    - name: git-credentials
      description: Secret with Git credentials for push
  stepTemplate:
    env:
      - name: HOME
        value: /tekton/home
  steps:
    # Step 1: git clone
    - name: git-clone
      image: alpine/git:2.43.0
      script: |
        #!/bin/sh
        set -eu
        cd $(workspaces.shared-workspace.path)
        # Configure git credentials from workspace
        cp $(workspaces.git-credentials.path)/.gitconfig $HOME/.gitconfig 2>/dev/null || true
        cp $(workspaces.git-credentials.path)/.git-credentials $HOME/.git-credentials 2>/dev/null || true
        git config --global credential.helper store
        # Extract username/password from workspace secret
        if [ -f "$(workspaces.git-credentials.path)/username" ]; then
          UNAME=$(cat $(workspaces.git-credentials.path)/username)
          PASSWD=$(cat $(workspaces.git-credentials.path)/password)
          REPO_URL=$(echo "$(params.manifest-repo-url)" | sed "s|https://|https://${UNAME}:${PASSWD}@|")
        else
          REPO_URL="$(params.manifest-repo-url)"
        fi
        git clone -b "$(params.manifest-repo-branch)" "$REPO_URL" repo
        cd repo
        git config user.email "tekton-pipeline@otel-demo-ci.local"
        git config user.name "Tekton Pipeline"

    # Step 2: kustomize edit set image
    - name: update-image
      image: registry.k8s.io/kustomize/kustomize:v5.4.3
      script: |
        #!/bin/sh
        set -eu
        APP="$(params.app-name)"
        TAG="$(params.image-tag)"

        # Map app-name to image repository
        case "$APP" in
          frontend)         IMAGE="ghcr.io/open-telemetry/demo:${TAG}-frontend" ;;
          cart)             IMAGE="ghcr.io/open-telemetry/demo:${TAG}-cart" ;;
          currency)         IMAGE="ghcr.io/open-telemetry/demo:${TAG}-currency" ;;
          product-catalog)  IMAGE="ghcr.io/open-telemetry/demo:${TAG}-product-catalog" ;;
          checkout)         IMAGE="ghcr.io/open-telemetry/demo:${TAG}-checkout" ;;
          payment)          IMAGE="ghcr.io/open-telemetry/demo:${TAG}-payment" ;;
          shipping)         IMAGE="ghcr.io/open-telemetry/demo:${TAG}-shipping" ;;
          ad)               IMAGE="ghcr.io/open-telemetry/demo:${TAG}-ad" ;;
          recommendation)   IMAGE="ghcr.io/open-telemetry/demo:${TAG}-recommendation" ;;
          email)            IMAGE="ghcr.io/open-telemetry/demo:${TAG}-email" ;;
          *)                echo "ERROR: unknown app '${APP}'"; exit 1 ;;
        esac

        OVERLAY="$(workspaces.shared-workspace.path)/repo/otel-demo/overlays/dev"
        cd "$OVERLAY"

        # Extract base image reference for this app (used as kustomize edit key)
        BASE_IMAGE=$(grep -r "image:.*demo:.*-${APP}" $(workspaces.shared-workspace.path)/repo/otel-demo/base/ -h \
          | head -1 | sed "s/.*image: *'\\{0,1\\}//; s/'\\{0,1\\} *$//" | xargs)

        # Check effective image: overlay images section takes precedence over base
        OVERLAY_TAG=$(grep -A2 "name: ${BASE_IMAGE}" kustomization.yaml 2>/dev/null \
          | grep "newTag:" | sed 's/.*newTag: *//' | head -1)
        if [ -n "$OVERLAY_TAG" ]; then
          OVERLAY_NAME=$(grep -A1 "name: ${BASE_IMAGE}" kustomization.yaml 2>/dev/null \
            | grep "newName:" | sed 's/.*newName: *//' | head -1)
          EFFECTIVE="${OVERLAY_NAME:-ghcr.io/open-telemetry/demo}:${OVERLAY_TAG}"
        else
          EFFECTIVE="${BASE_IMAGE}"
        fi

        echo "Base:      ${BASE_IMAGE}"
        echo "Effective: ${EFFECTIVE}"
        echo "New:       ${IMAGE}"

        if [ "$EFFECTIVE" = "$IMAGE" ]; then
          echo "Image already at target tag. No-op."
          echo "NO_CHANGE" > $(workspaces.shared-workspace.path)/update-status
          exit 0
        fi

        kustomize edit set image "${BASE_IMAGE}=${IMAGE}"
        echo "CHANGED" > $(workspaces.shared-workspace.path)/update-status
        echo "${BASE_IMAGE}" > $(workspaces.shared-workspace.path)/current-image
        echo "${IMAGE}" > $(workspaces.shared-workspace.path)/new-image

    # Step 3: download kustomize (needed for retry in git-push)
    - name: fetch-kustomize
      image: registry.k8s.io/kustomize/kustomize:v5.4.3
      script: |
        #!/bin/sh
        set -eu
        cp /app/kustomize $(workspaces.shared-workspace.path)/kustomize
        chmod +x $(workspaces.shared-workspace.path)/kustomize
        echo "kustomize copied to workspace"

    # Step 4: git commit & push (with retry for parallel Stage pushes)
    - name: git-push
      image: alpine/git:2.43.0
      script: |
        #!/bin/sh
        set -eu
        STATUS=$(cat $(workspaces.shared-workspace.path)/update-status)
        if [ "$STATUS" = "NO_CHANGE" ]; then
          echo "No changes to commit. Skipping push."
          exit 0
        fi

        KUSTOMIZE="$(workspaces.shared-workspace.path)/kustomize"
        CURRENT_IMAGE=$(cat $(workspaces.shared-workspace.path)/current-image)
        NEW_IMAGE=$(cat $(workspaces.shared-workspace.path)/new-image)
        BRANCH="$(params.manifest-repo-branch)"
        REPO="$(workspaces.shared-workspace.path)/repo"
        OVERLAY="${REPO}/otel-demo/overlays/dev"

        cd "$REPO"
        git add -A
        git commit -m "chore(release): bump $(params.app-name) to $(params.image-tag) [skip ci]"

        MAX_RETRIES=5
        for i in $(seq 1 $MAX_RETRIES); do
          if git push origin "$BRANCH"; then
            echo "Push succeeded (attempt $i)"
            exit 0
          fi
          echo "Push failed (attempt $i/$MAX_RETRIES), pulling latest and re-applying..."
          # Discard local commit, pull latest, re-apply kustomize change
          git reset --hard HEAD~1
          git pull origin "$BRANCH"
          cd "$OVERLAY"
          "$KUSTOMIZE" edit set image "${CURRENT_IMAGE}=${NEW_IMAGE}"
          cd "$REPO"
          git add -A
          git commit -m "chore(release): bump $(params.app-name) to $(params.image-tag) [skip ci]"
        done
        echo "ERROR: Push failed after $MAX_RETRIES attempts"
        exit 1

    # Step 5: argocd sync & wait (with retry for concurrent sync operations)
    - name: argocd-sync-wait
      image: quay.io/argoproj/argocd:v2.12.13
      envFrom:
        - configMapRef:
            name: argocd-env-configmap
        - secretRef:
            name: argocd-env-secret
      script: |
        #!/bin/sh
        set -eu
        # Retry sync in case another Stage task is syncing the same app
        MAX_SYNC_RETRIES=12
        for i in $(seq 1 $MAX_SYNC_RETRIES); do
          if argocd app sync otel-demo-dev --insecure --grpc-web --timeout 600; then
            break
          fi
          if [ "$i" = "$MAX_SYNC_RETRIES" ]; then
            echo "ERROR: Sync failed after $MAX_SYNC_RETRIES attempts"
            exit 1
          fi
          echo "Sync attempt $i failed, retrying in 10s..."
          sleep 10
        done
        argocd app wait otel-demo-dev --health --insecure --grpc-web --timeout 600
